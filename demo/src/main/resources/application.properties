############################################################
# SERVER SETTINGS
############################################################
server.port=${PORT:8080}

############################################################
# DATABASE CONFIGURATION (RAILWAY MYSQL)
############################################################
# Using environment variables recommended by Railway
spring.datasource.url=jdbc:mysql://${RAILWAY_MYSQL_HOST}:${RAILWAY_MYSQL_PORT}/${RAILWAY_MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${RAILWAY_MYSQL_USER}
spring.datasource.password=${RAILWAY_MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################################################
# JPA / HIBERNATE SETTINGS
############################################################
spring.jpa.hibernate.ddl-auto=update      # Options: validate | update | create | create-drop
spring.jpa.show-sql=true                  # Logs SQL queries in console
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false             # Prevents lazy loading issues in web views

############################################################
# CONNECTION POOL (HIKARICP)
############################################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true

############################################################
# LOGGING (Optional)
############################################################
logging.level.org.springframework=INFO
logging.level.com.example.demo=DEBUG